<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - 2N1</title>
    <meta name="description" content="Khôi phục mật khẩu tài khoản 2N1">
    <link rel="stylesheet" href="public/css/main.css">
    <link rel="stylesheet" href="public/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Particle Background Effect -->
    <div id="particles-bg"></div>

    <!-- Forgot Password Container -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-container">
                    <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="url(#gradient1)" stroke-width="3" />
                        <circle cx="50" cy="50" r="35" fill="url(#gradient2)" />
                        <path d="M50 20 L50 50 L70 50" stroke="white" stroke-width="3" stroke-linecap="round" />
                        <defs>
                            <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.3" />
                                <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.3" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <h1 class="logo-text">Quên mật khẩu</h1>
                </div>
                <p class="auth-subtitle">Nhập email để nhận mã xác thực</p>
            </div>

            <!-- Step 1: Request Code -->
            <form id="forgotPasswordForm" class="auth-form">
                <div class="form-group">
                    <label for="forgotEmail">Email đã đăng ký</label>
                    <input type="email" id="forgotEmail" name="email" required autocomplete="email">
                    <span class="input-highlight"></span>
                </div>

                <div id="forgotError" class="error-message"></div>
                <div id="forgotSuccess" class="success-message"></div>

                <button type="submit" class="btn btn-primary">
                    <span class="btn-text">Gửi mã xác thực</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <!-- Step 2: Verify Code & Reset Password -->
            <form id="resetPasswordForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label for="verificationCode">Mã xác thực (đã gửi vào email)</label>
                    <input type="text" id="verificationCode" name="code" required maxlength="6" autocomplete="off">
                    <span class="input-highlight"></span>
                    <small class="form-hint">Nhập mã 6 chữ số</small>
                </div>

                <div class="form-group">
                    <label for="newPassword">Mật khẩu mới</label>
                    <input type="password" id="newPassword" name="password" required minlength="6"
                        autocomplete="new-password">
                    <span class="input-highlight"></span>
                </div>

                <div class="form-group">
                    <label for="confirmNewPassword">Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirmNewPassword" name="confirmPassword" required
                        autocomplete="new-password">
                    <span class="input-highlight"></span>
                </div>

                <div id="resetError" class="error-message"></div>
                <div id="resetSuccess" class="success-message"></div>

                <button type="submit" class="btn btn-primary">
                    <span class="btn-text">Đặt lại mật khẩu</span>
                    <span class="btn-loader"></span>
                </button>

                <button type="button" id="resendCodeBtn" class="btn btn-secondary">
                    <span class="btn-text">Gửi lại mã</span>
                </button>
            </form>

            <div class="auth-footer">
                <p><a href="index.html" class="link-text">← Quay lại đăng nhập</a></p>
            </div>
        </div>
    </div>

    <script src="public/js/particles.js"></script>
    <script src="public/js/storage.js"></script>
    <script src="public/js/auth.js"></script>
</body>

</html>
