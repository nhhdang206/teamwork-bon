<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2N1 - Học Tập Thông Minh</title>
    <meta name="description" content="Ứng dụng học tập thông minh với AI, giúp bạn tập trung và quản lý thời gian hiệu quả">
    <link rel="stylesheet" href="public/css/main.css">
    <link rel="stylesheet" href="public/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Particle Background Effect -->
    <div id="particles-bg"></div>
    
    <!-- Login Container -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-container">
                    <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="url(#gradient1)" stroke-width="3"/>
                        <circle cx="50" cy="50" r="35" fill="url(#gradient2)"/>
                        <path d="M50 20 L50 50 L70 50" stroke="white" stroke-width="3" stroke-linecap="round"/>
                        <defs>
                            <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.3" />
                                <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.3" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <h1 class="logo-text">2N1</h1>
                </div>
                <p class="auth-subtitle">Học tập thông minh với AI</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail">Email hoặc Tên đăng nhập</label>
                    <input type="text" id="loginEmail" name="email" required autocomplete="username">
                    <span class="input-highlight"></span>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Mật khẩu</label>
                    <input type="password" id="loginPassword" name="password" required autocomplete="current-password">
                    <span class="input-highlight"></span>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">Ghi nhớ đăng nhập</span>
                    </label>
                    <a href="forgot-password.html" class="link-text">Quên mật khẩu?</a>
                </div>

                <div id="loginError" class="error-message"></div>

                <button type="submit" class="btn btn-primary">
                    <span class="btn-text">Đăng nhập</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Chưa có tài khoản? <a href="register.html" class="link-text">Đăng ký ngay</a></p>
            </div>
        </div>
    </div>

    <script src="public/js/particles.js"></script>
    <script src="public/js/storage.js"></script>
    <script src="public/js/auth.js"></script>
</body>
</html>
